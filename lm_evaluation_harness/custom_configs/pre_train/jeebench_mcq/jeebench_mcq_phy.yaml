task: jeebench_mcq_phy
dataset_path: daman1209arora/jeebench
output_type: multiple_choice
training_split: null
validation_split: null
test_split: test

process_docs: !function utils.process_docs_phy

fewshot_config:
  sampler: first_n
  samples: !function utils.list_fewshot_samples_phy

doc_to_text: "{{question.strip()}}\nAnswer:"
doc_to_choice: ["A", "B", "C", "D"]
doc_to_target: answer

num_fewshot: 1

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true

metadata:
  version: 0.0.1
