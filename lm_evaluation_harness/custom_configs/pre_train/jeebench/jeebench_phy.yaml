task: jeebench_phy
dataset_path: daman1209arora/jeebench
test_split: test
output_type: generate_until

process_docs: !function utils.process_docs_phy
doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target
process_results: !function utils.process_results

generation_kwargs:
  until:
    - "Problem:"
    - "</s>"
    - "<|im_end|>"
  max_gen_toks: 2048
  do_sample: false
  temperature: 0.0

repeats: 1
num_fewshot: 0

metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true

metadata:
  version: 0.0.1
