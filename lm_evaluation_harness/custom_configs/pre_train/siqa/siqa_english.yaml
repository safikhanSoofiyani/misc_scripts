task: siqa_english
dataset_path: ai4bharat/social_i_qa
dataset_name: main
output_type: multiple_choice
training_split: null
test_split: validation
doc_to_text: "{{passage}}\nQuestion: {{question.strip()}}\nA. {{choices[0].strip()}}\nB. {{choices[1].strip()}}\nC. {{choices[2].strip()}}\nAnswer:"
doc_to_target: answer
doc_to_choice: ["A", "B", "C"]

num_fewshot: 5

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
