task: flores_en_xx_french
dataset_path: facebook/flores
dataset_name: eng_Latn-fra_Latn
training_split: null
validation_split: dev
fewshot_split: dev
test_split: devtest

fewshot_config:
  sampler: default
doc_to_text: "{{sentence_eng_Latn.strip()}}\nThe translation of the above sentence into French follows.\nThe translation is::"
doc_to_target: "{{sentence_fra_Latn.strip()}}"

metric_list:
  - metric: chrf
  - metric: bleu

metadata:
  version: 0.0.1
