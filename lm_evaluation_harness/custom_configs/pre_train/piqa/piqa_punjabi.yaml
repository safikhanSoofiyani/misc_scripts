task: piqa_punjabi
dataset_path: ai4bharat/piqa
dataset_name: default
output_type: multiple_choice
training_split: null
test_split: validation
doc_to_text: "Question: {{question_Punjabi_translation.strip()}}\nA. {{choices_Punjabi_translation[0].strip()}}\nB. {{choices_Punjabi_translation[1].strip()}}\nAnswer:"
doc_to_target: answer
doc_to_choice: ["A", "B"]

num_fewshot: 5

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
