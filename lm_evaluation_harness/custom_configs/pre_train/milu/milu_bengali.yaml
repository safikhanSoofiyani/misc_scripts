task: milu_bengali
dataset_path: ai4bharat/milu
dataset_name: Bengali
output_type: multiple_choice
training_split: null
validation_split: validation
test_split: test

fewshot_split: validation
fewshot_config:
  sampler: default

# doc_to_text: "Question: {{question.strip()}}\nAnswer:"
# doc_to_choice: "{{choices}}"
doc_to_text: "{{question.strip()}}\\nA. {{option1}}\\nB. {{option2}}\\nC. {{option3}}\\nD. {{option4}}\\nAnswer:"
doc_to_choice: ["A", "B", "C", "D"]
doc_to_target: "{% if target == 'option1' %}0{% elif target == 'option2' %}1{% elif target == 'option3' %}2{% elif target == 'option4' %}3{% endif %}"

num_fewshot: 5

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true

metadata:
  version: 0.0.1