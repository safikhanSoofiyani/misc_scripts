task: commonsense_qa_german
dataset_path: yusuke1997/mCSQA
dataset_name: de
output_type: multiple_choice
training_split: train
validation_split: validation
test_split: test
doc_to_text: "Question: {{question.strip()}}\nA. {{choices['text'][0].strip()}}\nB. {{choices['text'][1].strip()}}\nC. {{choices['text'][2].strip()}}\nD. {{choices['text'][3].strip()}}\nE. {{choices['text'][4].strip()}}\nAnswer:"
doc_to_target: "{{choices['label'].index(answerKey)}}"
doc_to_choice: "{{choices['label']}}"

num_fewshot: 5

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
