task: race_high_english
dataset_path: ai4bharat/race
dataset_name: high
output_type: multiple_choice
training_split: null
validation_split: validation
test_split: test
doc_to_text: "{{passage}}\n Question: {{question.strip()}}\nA. {{choices[0].strip()}}\nB. {{choices[1].strip()}}\nC. {{choices[2].strip()}}\nD. {{choices[3].strip()}}\nAnswer:"
doc_to_target: answer
doc_to_choice: ["A", "B", "C", "D"]

num_fewshot: 5

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
