task: openbookqa_manipuri
dataset_path: ai4bharat/openbookqa
dataset_name: main
output_type: multiple_choice
training_split: null
validation_split: validation
test_split: test
doc_to_text: "Question: {{question_Manipuri_translation.strip()}}\nA. {{choices_Manipuri_translation[0].strip()}}\nB. {{choices_Manipuri_translation[1].strip()}}\nC. {{choices_Manipuri_translation[2].strip()}}\nD. {{choices_Manipuri_translation[3].strip()}}\nAnswer:"
doc_to_target: answer
doc_to_choice: ["A", "B", "C", "D"]

num_fewshot: 5

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
