task: ai2_arc_arc-challenge_bodo
dataset_path: ai4bharat/ai2_arc
dataset_name: ARC-Challenge
output_type: multiple_choice
training_split: train
validation_split: validation
test_split: test
doc_to_text: "Question: {{question_Bodo_translation.strip()}}\nA. {{choices_Bodo_translation[0].strip()}}\nB. {{choices_Bodo_translation[1].strip()}}\nC. {{choices_Bodo_translation[2].strip()}}\nD. {{choices_Bodo_translation[3].strip()}}\nAnswer:"
doc_to_target: answer
doc_to_choice: ["A", "B", "C", "D"]

num_fewshot: 5

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true