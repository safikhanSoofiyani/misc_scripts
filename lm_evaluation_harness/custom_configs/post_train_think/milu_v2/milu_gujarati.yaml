task: milu_v2_gujarati
dataset_path: ai4bharat/milu
dataset_name: Gujarati
output_type: generate_until
training_split: null
validation_split: validation
test_split: test

fewshot_split: validation
fewshot_config:
  sampler: default

description: "Below is a multiple choice question. After explanation finish your answer with statement \"the answer is \\boxed{X}\" where X is the correct letter from the below choices.\n"
doc_to_text: |
  Please read the question carefully and choose the correct answer from the given options.
  Question: {{question.strip()}}
  Options:
  A. {{option1}}
  B. {{option2}}
  C. {{option3}}
  D. {{option4}}

doc_to_target: "{% if target == 'option1' %}A{% elif target == 'option2' %}B{% elif target == 'option3' %}C{% elif target == 'option4' %}D{% endif %}"

generation_kwargs:
  until:
    - "</s>"
    - "<|im_end|>"
    - "<eos>"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_punctuation: true
    ignore_case: true
filter_list:
  - name: "custom-extract"
    filter:
      - function: "regex"
        regex_pattern: '\\boxed\s*\{\s*\*?\s*([ABCD])\s*\*?\s*\}'
      - function: "take_first"
