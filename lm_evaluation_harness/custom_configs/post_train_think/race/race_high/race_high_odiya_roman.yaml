task: race_high_odiya_roman
dataset_path: ai4bharat/race
dataset_name: high
output_type: generate_until
training_split: null
validation_split: validation
test_split: test

description: "Below is a passage with a multiple choice question. After explanation finish your answer with statement \"the answer is (X)\" where X is the correct letter from the below choices.\n"
doc_to_text: |
  Please read the passage and the  question carefully and choose the correct answer from the given options.
  Passage: {{passage_Odiya_romanization.strip()}}
  Question: {{question_Odiya_romanization.strip()}}
  Options:
  A. {{choices_Odiya_romanization[0]}}
  B. {{choices_Odiya_romanization[1]}}
  C. {{choices_Odiya_romanization[2]}}
  D. {{choices_Odiya_romanization[3]}}

doc_to_target: "{% if answer == 0 %}A{% elif answer == 1 %}B{% elif answer == 2 %}C{% elif answer == 3 %}D{% endif %}"

generation_kwargs:
  until:
    - "</s>"
    - "<|im_end|>"
    - "<eos>"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_punctuation: true
    ignore_case: true
filter_list:
  - name: "custom-extract"
    filter:
      - function: "regex"
        regex_pattern: '(?:<?/think>?\s*)(?:.|\n)*?answer is\s*\*?\(?\*?([ABCD])\*?\)?\*?'
      - function: "take_first"
