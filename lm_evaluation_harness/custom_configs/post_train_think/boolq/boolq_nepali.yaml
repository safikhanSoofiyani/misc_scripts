task: boolq_nepali
dataset_path: ai4bharat/boolq
dataset_name: null
output_type: generate_until
training_split: null
test_split: validation
description: "Below is a passage along with a multiple choice question. Answer the question based on the passage. After explanation finish your answer with statement \"the answer is (X)\" where X is the correct letter from the below choices.\n"
doc_to_text: |
  Please read the passage and question carefully and choose the correct answer from the given options.
  Passage: {{passage_Nepali_translation}}
  Question: {{question_Nepali_translation.strip()}}
  Options:
  A. {{choices_Nepali_translation[0]}}
  B. {{choices_Nepali_translation[1]}}

doc_to_target: "{% if answer == 0 %}A{% elif answer == 1 %}B{% elif answer == 2 %}C{% elif answer == 3 %}D{% endif %}"

generation_kwargs:
  until:
    - "</s>"
    - "<|im_end|>"
    - "<eos>"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_punctuation: true
    ignore_case: true
filter_list:
  - name: "custom-extract"
    filter:
      - function: "regex"
        regex_pattern: '(?:<?/think>?\s*)(?:.|\n)*?answer is\s*\*?\(?\*?([ABCD])\*?\)?\*?'
      - function: "take_first"
