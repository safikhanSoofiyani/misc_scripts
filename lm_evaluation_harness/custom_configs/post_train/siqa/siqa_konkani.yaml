task: siqa_konkani
dataset_path: ai4bharat/social_i_qa
dataset_name: main
output_type: generate_until
training_split: null
test_split: validation

description: "Below is a multiple choice question. After explanation finish your answer with statement \"the answer is (X)\" where X is the correct letter from the below choices.\n"
doc_to_text: |
  Please read the passage and question carefully and choose the correct answer from the given options.
  Passage: {{passage_Konkani_translation}}
  Question: {{question_Konkani_translation.strip()}}
  Options:
  A. {{choices_Konkani_translation[0]}}
  B. {{choices_Konkani_translation[1]}}
  C. {{choices_Konkani_translation[2]}}

doc_to_target: "{% if answer == 0 %}A{% elif answer == 1 %}B{% elif answer == 2 %}C{% elif answer == 3 %}D{% endif %}"

generation_kwargs:
  until:
    - "</s>"
    - "<|im_end|>"
    - "<eos>"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_punctuation: true
    ignore_case: true
filter_list:
  - name: "custom-extract"
    filter:
      - function: "regex"
        regex_pattern: 'answer is\s*\*?\(?\*?([ABCD])\*?\)?\*?'
      - function: "take_first"
